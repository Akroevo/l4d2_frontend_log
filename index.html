<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#b91c1c" />
  <meta name="description" content="Registre missões e sobreviventes de Left 4 Dead 2" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <title>L4D2 Survivor Log</title>
</head>
<body>

  
  <div class="scanlines" aria-hidden="true"></div>

  <div class="blood-drip" aria-hidden="true"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <span class="logo-icon">☣</span>
        <div>
          <h1 class="site-title">SURVIVOR LOG</h1>
          <p class="site-sub">LEFT 4 DEAD 2 — FIELD REPORT SYSTEM</p>
        </div>
      </div>
      <div class="header-status">
        <span class="status-dot"></span>
        <span class="status-text">SISTEMA ATIVO</span>
      </div>
    </div>
   
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="missions">
        ☠ MISSÕES
      </button>
      <button class="tab-btn" data-tab="survivors">
        ⚡ SOBREVIVENTES
      </button>
    </nav>
  </header>

  <main class="main-content">

    
    <section class="tab-panel active" id="tab-missions">
      <div class="panel-grid">

       
        <div class="card form-card">
          <div class="card-header">
            <span class="card-icon">📋</span>
            <h2 id="mission-form-title" class="card-title">REGISTRAR MISSÃO</h2>
          </div>

          <form id="mission-form" novalidate>
            <input type="hidden" id="mission-id" />

            <div class="field-group">
              <label class="field-label" for="campaign">CAMPANHA</label>
              <select id="campaign" class="field-input" required>
                <option value="">— SELECIONAR —</option>
                <option>Dead Center</option>
                <option>Dark Carnival</option>
                <option>Swamp Fever</option>
                <option>Hard Rain</option>
                <option>The Parish</option>
                <option>The Passing</option>
                <option>The Sacrifice</option>
                <option>Cold Stream</option>
                <option>No Mercy</option>
                <option>Crash Course</option>
                <option>Death Toll</option>
                <option>Dead Air</option>
                <option>Blood Harvest</option>
                <option>The Last Stand</option>
              </select>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="difficulty">DIFICULDADE</label>
                <select id="difficulty" class="field-input" required>
                  <option value="">— NÍVEL —</option>
                  <option>Easy</option>
                  <option>Normal</option>
                  <option>Advanced</option>
                  <option>Expert</option>
                </select>
              </div>
              <div class="field-group">
                <label class="field-label" for="deaths">MORTES</label>
                <input type="number" id="deaths" class="field-input" min="0" value="0" />
              </div>
            </div>

            <div class="field-group">
              <label class="field-label" for="survivors-input">SOBREVIVENTES (separar por vírgula)</label>
              <input type="text" id="survivors-input" class="field-input" placeholder="Ex: Coach, Rochelle, Nick, Ellis" />
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="playedAt">DATA/HORA DA MISSÃO</label>
                <input type="datetime-local" id="playedAt" class="field-input" required />
              </div>
              <div class="field-group center-check">
                <label class="field-label">CONCLUÍDA?</label>
                <label class="toggle-label">
                  <input type="checkbox" id="completed" class="toggle-input" />
                  <span class="toggle-track"></span>
                  <span class="toggle-text">SIM</span>
                </label>
              </div>
            </div>

            <div class="field-group">
              <label class="field-label" for="mission-notes">ANOTAÇÕES DE CAMPO</label>
              <textarea id="mission-notes" class="field-input" rows="3" placeholder="O que aconteceu nessa missão..."></textarea>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">⚔ SALVAR MISSÃO</button>
              <button type="button" id="mission-cancel" class="btn btn-ghost hidden">✕ CANCELAR</button>
            </div>
            <p id="mission-message" class="form-message"></p>
          </form>
        </div>

       
        <div class="card list-card">
          <div class="card-header">
            <span class="card-icon">📡</span>
            <h2 class="card-title">RELATÓRIOS DE CAMPO</h2>
            <button id="mission-reload" class="btn btn-outline btn-sm">↻ ATUALIZAR</button>
          </div>
          <div id="missions-list" class="entries-list"></div>
        </div>

      </div>
    </section>

    
    <section class="tab-panel" id="tab-survivors">
      <div class="panel-grid">

      
        <div class="card form-card">
          <div class="card-header">
            <span class="card-icon">🩸</span>
            <h2 id="survivor-form-title" class="card-title">REGISTRAR SOBREVIVENTE</h2>
          </div>

          <form id="survivor-form" novalidate>
            <input type="hidden" id="survivor-id" />

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="s-name">NOME</label>
                <input type="text" id="s-name" class="field-input" required placeholder="Nome completo" />
              </div>
              <div class="field-group">
                <label class="field-label" for="s-nickname">CODINOME</label>
                <input type="text" id="s-nickname" class="field-input" placeholder="Apelido" />
              </div>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="s-role">FUNÇÃO</label>
                <select id="s-role" class="field-input" required>
                  <option value="">— ROLE —</option>
                  <option>Scout</option>
                  <option>Medic</option>
                  <option>Explosives Expert</option>
                  <option>Heavy Gunner</option>
                  <option>All-rounder</option>
                </select>
              </div>
              <div class="field-group">
                <label class="field-label" for="s-status">STATUS</label>
                <select id="s-status" class="field-input" required>
                  <option value="Alive">Alive</option>
                  <option value="Incapacitated">Incapacitated</option>
                  <option value="Dead">Dead</option>
                  <option value="Unknown">Unknown</option>
                </select>
              </div>
            </div>

            <div class="field-row">
              <div class="field-group">
                <label class="field-label" for="s-kills">KILLS</label>
                <input type="number" id="s-kills" class="field-input" min="0" value="0" />
              </div>
              <div class="field-group">
                <label class="field-label" for="s-rescues">RESGATES</label>
                <input type="number" id="s-rescues" class="field-input" min="0" value="0" />
              </div>
            </div>

            <div class="field-group">
              <label class="field-label" for="s-bio">BIO / NOTAS</label>
              <textarea id="s-bio" class="field-input" rows="3" placeholder="Histórico do sobrevivente..."></textarea>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">⚔ SALVAR SOBREVIVENTE</button>
              <button type="button" id="survivor-cancel" class="btn btn-ghost hidden">✕ CANCELAR</button>
            </div>
            <p id="survivor-message" class="form-message"></p>
          </form>
        </div>

      
        <div class="card list-card">
          <div class="card-header">
            <span class="card-icon">👥</span>
            <h2 class="card-title">REGISTRO DE SOBREVIVENTES</h2>
            <button id="survivor-reload" class="btn btn-outline btn-sm">↻ ATUALIZAR</button>
          </div>
          <div id="survivors-list" class="entries-list"></div>
        </div>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <span>L4D2 SURVIVOR LOG &copy; 2024</span>
    <span class="footer-sep">|</span>
    <span>STAY SAFE. KEEP MOVING. WATCH YOUR BACK.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
